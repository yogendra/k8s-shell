# Run to install or update
# mkdir -p ~/.config/tmux; curl -sSL https://raw.githubusercontent.com/yogendra-avgo/k8s-shell/main/src/tmux.conf -o ~/.config/tmux/tmux.conf

set-option -g status-keys vi
set-option -g mode-keys vi
set -g mouse on

# True 24-bit colour. Without this tmux has no way to know the outer
# terminal supports it (no Tc/RGB terminfo capability in this image, and
# that's invisible/inconsistent across docker exec vs kubectl exec/attach
# clients), so it silently downgrades catppuccin's hex colours to the
# nearest of a 256-colour palette - washed out and slightly wrong hues.
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
setw -g pane-base-index 1
setw -g status-position top

bind c new-window -c "#{pane_current_path}"
bind m set-option -g mouse

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind b setw synchronize-panes
bind j choose-window 'join-pane -v -t "%%"'

set -g @catppuccin_flavour 'mocha'

set -g @continuum-restore 'on'

set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sidebar'

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
