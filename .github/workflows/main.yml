name: Build and Publish
"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (native arch, loaded locally)
        run: task build
      - name: Smoke test bundled tools
        run: task smoke

  publish:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish :latest
        run: task publish IMAGE=ghcr.io/${{ github.repository }} TAG=latest
      - name: Publish :sha-<short-sha>
        run: task publish IMAGE=ghcr.io/${{ github.repository }} TAG=sha-${{ github.sha }}
      - name: Get published digest
        if: github.ref == 'refs/heads/main'
        id: digest
        run: |
          digest=$(docker buildx imagetools inspect ghcr.io/${{ github.repository }}:latest --format '{{.Manifest.Digest}}')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Update deployment.yaml with published image digest
        if: github.ref == 'refs/heads/main'
        run: |
          sed -i -E "s#(ghcr\.io/${{ github.repository }}:latest)(@sha256:[a-f0-9]+)?#\1@${{ steps.digest.outputs.digest }}#g" k8s/deployment.yaml
      - name: Commit and push updated deployment.yaml
        if: github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- k8s/deployment.yaml; then
            echo "deployment.yaml already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update k8s-shell image digest to ${{ steps.digest.outputs.digest }} [skip ci]"
          git push
