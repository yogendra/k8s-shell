name: Build and Publish
"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (native arch, loaded locally)
        run: task build
      - name: Smoke test bundled tools
        run: task smoke

  publish:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish :latest
        run: task publish IMAGE=ghcr.io/${{ github.repository }} TAG=latest
      - name: Publish :sha-<short-sha>
        run: task publish IMAGE=ghcr.io/${{ github.repository }} TAG=sha-${{ github.sha }}
